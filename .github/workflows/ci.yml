name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cargo clippy (workspace)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Cargo test (workspace)
        run: cargo test --workspace

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync --extra dev --python 3.13
      - name: Build Rust extension
        run: uv run maturin develop --release
      - name: Ruff check
        run: uv run ruff check tests/ python/
      - name: Ruff format
        run: uv run ruff format --check tests/ python/
      - name: Mypy
        run: uv run mypy python/dateutil_rs/ tests/ --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Build Rust extension (v0 + v1)
        run: uv run maturin develop --release

      - name: Verify v0 and v1 imports
        run: |
          uv run python -c "
          import dateutil_rs.easter; print('v0 easter OK')
          import dateutil_rs.parser; print('v0 parser OK')
          import dateutil_rs.relativedelta; print('v0 relativedelta OK')
          import dateutil_rs.rrule; print('v0 rrule OK')
          import dateutil_rs.tz; print('v0 tz OK')
          import dateutil_rs.v1.easter; print('v1 easter OK')
          import dateutil_rs.v1.parser; print('v1 parser OK')
          import dateutil_rs.v1.relativedelta; print('v1 relativedelta OK')
          import dateutil_rs.v1.rrule; print('v1 rrule OK')
          "

      - name: Run tests via dateutil_rs
        run: >
          uv run pytest tests/ --rust -x -q
          -k "not testInheritance and not testRelativeDeltaFractionalAbsolutes"
