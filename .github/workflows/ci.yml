name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cargo clippy (workspace)
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Cargo test (workspace)
        run: cargo test --workspace

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync --extra dev --python 3.13
      - name: Build Rust extension
        run: uv run maturin develop --release
      - name: Ruff check
        run: uv run ruff check python/ tests/ benchmarks/
      - name: Ruff format
        run: uv run ruff format --check python/ tests/ benchmarks/
      - name: Mypy
        run: uv run mypy python/dateutil_rs/ tests/ --ignore-missing-imports

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Build Rust extension
        run: uv run maturin develop --release

      - name: Verify imports
        run: |
          uv run python -c "
          from dateutil_rs import easter, parse, isoparse, relativedelta, rrule, rruleset, rrulestr
          from dateutil_rs import gettz, tzutc, tzoffset, tzfile, tzlocal
          from dateutil_rs import MO, TU, WE, TH, FR, SA, SU
          print('All imports OK')
          "

      - name: Run tests via dateutil_rs
        run: >
          uv run pytest tests/ --rust -x -q -k "not testInheritance"
