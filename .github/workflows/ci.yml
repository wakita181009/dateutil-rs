name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cargo clippy
        run: cargo clippy --manifest-path crates/dateutil-rs/Cargo.toml -- -D warnings
      - name: Cargo test
        run: cargo test --manifest-path crates/dateutil-rs/Cargo.toml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.13
      - run: uv sync --python 3.13
      - name: Ruff check
        run: uv run ruff check tests/ python/
      - name: Ruff format
        run: uv run ruff format --check tests/ python/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Build Rust extension
        run: uv run maturin develop --release

      - name: Run tests via dateutil_rs
        run: >
          uv run pytest tests/ --rust -x -q
          -k "not testInheritance and not testRelativeDeltaFractionalAbsolutes"
